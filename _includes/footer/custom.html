<!-- Support for MatJax -->
<script defer src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script"></script>

<!-- Support for Mermaid -->
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({startOnLoad:true, theme:'default'});
    await mermaid.run({querySelector:'code.language-mermaid'});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  var toggle = document.getElementById("theme-toggle");
  var icon = document.getElementById("theme-icon");
  var label = toggle ? toggle.querySelector(".theme-toggle-label") : null;
  var themeColor = document.querySelector('meta[name="theme-color"]');

  function setTheme(theme) {
    var isDark = theme === "dark";

    document.documentElement.classList.toggle("dark-mode", isDark);

    try {
      localStorage.setItem("theme", theme);
    } catch (e) {}

    if (icon) icon.textContent = isDark ? "☀️" : "🌙";
    if (label) label.textContent = isDark ? "Light" : "Dark";
    if (toggle) {
      toggle.setAttribute("aria-pressed", isDark ? "true" : "false");
      toggle.setAttribute("aria-label", isDark ? "Switch to light theme" : "Switch to dark theme");
      toggle.setAttribute("title", isDark ? "Switch to light theme" : "Switch to dark theme");
    }
    if (themeColor) themeColor.setAttribute("content", isDark ? "#0d1117" : "#ffffff");
  }

  var savedTheme = null;
  try {
    savedTheme = localStorage.getItem("theme");
  } catch (e) {}

  var initialTheme = document.documentElement.classList.contains("dark-mode") ? "dark" : "light";
  setTheme(savedTheme || initialTheme);

  if (toggle) {
    toggle.addEventListener("click", function () {
      var nextTheme = document.documentElement.classList.contains("dark-mode") ? "light" : "dark";
      setTheme(nextTheme);
    });
  }
});
</script>

<!-- end custom footer snippets -->
