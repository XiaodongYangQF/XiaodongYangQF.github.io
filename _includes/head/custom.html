{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- Apply saved theme before the page paints, so dark mode does not flash light first. -->
<script>
  (function () {
    try {
      var savedTheme = localStorage.getItem("theme");
      var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (savedTheme === "dark" || (!savedTheme && prefersDark)) {
        document.documentElement.classList.add("dark-mode");
      }
    } catch (e) {}
  })();
</script>

<style>
/* Light/dark theme variables */
:root {
  --xy-bg: #ffffff;
  --xy-surface: #ffffff;
  --xy-surface-soft: #f6f8fa;
  --xy-text: #494e52;
  --xy-heading: #2f363d;
  --xy-muted: #6a737d;
  --xy-border: #eaecef;
  --xy-link: #52adc8;
  --xy-link-hover: #2d839a;
  --xy-toggle-bg: #f6f8fa;
  --xy-toggle-text: #24292f;
  --xy-toggle-border: #d0d7de;
}

html.dark-mode {
  --xy-bg: #0d1117;
  --xy-surface: #161b22;
  --xy-surface-soft: #21262d;
  --xy-text: #c9d1d9;
  --xy-heading: #e6edf3;
  --xy-muted: #8b949e;
  --xy-border: #30363d;
  --xy-link: #58a6ff;
  --xy-link-hover: #79c0ff;
  --xy-toggle-bg: #21262d;
  --xy-toggle-text: #e6edf3;
  --xy-toggle-border: #30363d;
}

/* Main dark-mode surfaces */
body,
.initial-content,
.page,
.archive,
.sidebar,
.page__content,
.author__content,
.greedy-nav,
.masthead,
.page__footer {
  /* background-color: var(--xy-bg) !important; */
  background-color: rgba(255, 255, 255, 0.8) !important;
  color: var(--xy-text) !important;
}

.masthead,
.page__footer,
.greedy-nav .hidden-links,
.toc,
table,
th,
td {
  border-color: var(--xy-border) !important;
}

html.dark-mode .greedy-nav .hidden-links,
html.dark-mode .toc,
html.dark-mode .notice,
html.dark-mode .notice--primary,
html.dark-mode .notice--info,
html.dark-mode .notice--warning,
html.dark-mode .notice--success,
html.dark-mode .notice--danger,
html.dark-mode code,
html.dark-mode pre,
html.dark-mode .highlighter-rouge,
html.dark-mode .highlight,
html.dark-mode blockquote,
html.dark-mode table,
html.dark-mode thead,
html.dark-mode tbody,
html.dark-mode tr,
html.dark-mode th,
html.dark-mode td {
  background-color: var(--xy-surface) !important;
  color: var(--xy-text) !important;
}

html.dark-mode .greedy-nav .hidden-links:after {
  border-color: var(--xy-surface) transparent !important;
}

html.dark-mode .greedy-nav .hidden-links a:hover,
html.dark-mode .toc__menu a:hover {
  background-color: var(--xy-surface-soft) !important;
  color: var(--xy-heading) !important;
}

h1, h2, h3, h4, h5, h6,
.page__title,
.archive__item-title,
.author__name {
  color: var(--xy-heading) !important;
}

p, li, dt, dd,
.page__meta,
.archive__item-excerpt,
.author__bio,
.page__footer,
.page__footer-copyright {
  color: var(--xy-text) !important;
}

a {
  color: var(--xy-link) !important;
}

a:hover {
  color: var(--xy-link-hover) !important;
}

.greedy-nav a,
.page__footer a,
.author__urls a,
.toc__menu a {
  color: var(--xy-text) !important;
}

.greedy-nav a:hover,
.page__footer a:hover,
.author__urls a:hover,
.toc__menu a:hover {
  color: var(--xy-link-hover) !important;
}

/* Right-top theme switch */
.masthead__inner-wrap {
  position: relative;
  padding-right: 8.2rem !important;
}

.site-theme-toggle {
  position: absolute;
  top: 50%;
  right: 1rem;
  transform: translateY(-50%);
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  min-height: 2rem;
  padding: 0.35rem 0.7rem;
  border: 1px solid var(--xy-toggle-border);
  border-radius: 999px;
  background: var(--xy-toggle-bg);
  color: var(--xy-toggle-text);
  font-size: 0.78rem;
  font-weight: 600;
  line-height: 1;
  cursor: pointer;
  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
  transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
  z-index: 30;
}

.site-theme-toggle:hover {
  opacity: 0.88;
  transform: translateY(-50%) scale(1.02);
}

.site-theme-toggle:focus {
  outline: 2px solid var(--xy-link);
  outline-offset: 2px;
}

#theme-icon {
  font-size: 0.95rem;
  line-height: 1;
}

/* Keep the mobile dropdown menu button separate from the theme button. */
.greedy-nav > button:not(.hidden) {
  right: 3.9rem !important;
}

@media (max-width: 600px) {
  .masthead__inner-wrap {
    padding-right: 6.5rem !important;
  }

  .greedy-nav > button:not(.hidden) {
    right: 3.3rem !important;
  }

  .site-theme-toggle {
    right: 0.75rem;
    padding: 0.4rem 0.55rem;
  }

  .theme-toggle-label {
    display: none;
  }
}

/* ------------------------------------------------------------
   Right-side table of contents
   Main content first, TOC second
   ------------------------------------------------------------ */

@media screen and (min-width: 1024px) {

  /* NEW: give more space back to the main page */
  article.page {
    padding-right: 0 !important;
  }

  /* NEW: create two columns:
     left = main content
     right = small TOC */
  .page__content {
    display: grid !important;
    grid-template-columns: minmax(0, 1fr) 160px !important;
    column-gap: 1.2rem !important;
    align-items: start !important;
  }

  /* NEW: all normal content stays in the main column */
  .page__content > :not(.sidebar__right) {
    grid-column: 1 !important;
  }

  /* CHANGED: TOC is now a separate right column, not floating inside text */
  .page__content > .sidebar__right {
    grid-column: 2 !important;
    grid-row: 1 / span 100 !important;
    float: none !important;
    clear: none !important;
    width: 160px !important;
    min-width: 160px !important;
    max-width: 160px !important;
    margin: 0 !important;
    position: sticky !important;
    top: 5rem !important;
    z-index: 10 !important;
  }

  /* CHANGED: TOC box style */
  .page__content > .sidebar__right .toc {
    width: 100% !important;
    min-width: 0 !important;
    max-width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
    overflow: hidden !important;
    background-color: var(--xy-surface) !important;
    border: 1px solid var(--xy-border) !important;
    border-radius: 4px !important;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08) !important;
  }

  /* CHANGED: TOC title bar */
  .page__content > .sidebar__right .toc .nav__title {
    display: block !important;
    width: 100% !important;
    box-sizing: border-box !important;
    margin: 0 !important;
    padding: 0.55rem 0.8rem !important;
    background-color: #6a737d !important;
    color: #ffffff !important;
    font-size: 0.78rem !important;
    font-weight: 700 !important;
    line-height: 1.2 !important;
    white-space: nowrap !important;
    text-transform: none !important;
    letter-spacing: 0.02em !important;
  }

  /* CHANGED: TOC links */
  .page__content > .sidebar__right .toc__menu {
    width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  .page__content > .sidebar__right .toc__menu a {
    display: block !important;
    padding: 0.5rem 0.8rem !important;
    color: var(--xy-text) !important;
    font-size: 0.72rem !important;
    font-weight: 600 !important;
    line-height: 1.35 !important;
    text-decoration: none !important;
    border-bottom: 1px solid var(--xy-border) !important;
    text-transform: none !important;
    letter-spacing: 0 !important;
  }

  .page__content > .sidebar__right .toc__menu a:hover {
    color: var(--xy-link-hover) !important;
    background-color: var(--xy-surface-soft) !important;
  }

  /* NEW: indent subheadings in the TOC */
  .page__content > .sidebar__right .toc__menu li ul > li a {
    padding-left: 1.3rem !important;
    font-weight: 500 !important;
  }
}

/* NEW: on small screens, TOC becomes full-width block again */
@media screen and (max-width: 1023px) {
  .page__content {
    display: block !important;
  }

  .page__content > .sidebar__right {
    float: none !important;
    clear: both !important;
    width: 100% !important;
    min-width: 0 !important;
    max-width: 100% !important;
    margin: 0 0 1.5rem 0 !important;
    position: relative !important;
    top: auto !important;
  }

  .page__content > .sidebar__right .toc {
    width: 100% !important;
  }
}

</style>

<!-- end custom head snippets -->
